<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <title>UI Element Forge</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./assets/icons/icon-192.png">
  <link rel="stylesheet" href="./css/tokens.css">
  <link rel="stylesheet" href="./css/app.css">
  <link rel="stylesheet" href="./css/preview.css">
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand__mark" aria-hidden="true">◫</div>
        <div>
          <p class="eyebrow">PWA</p>
          <h1>UI Element Forge</h1>
        </div>
      </div>

      <div class="topbar__actions">
        <button id="installBtn" class="button ghost" type="button" hidden>Install</button>
        <button id="savePresetBtn" class="button" type="button">Save preset</button>
      </div>
    </header>

    <main class="app-grid">
      <aside class="panel panel--left">
        <div class="editor-tabs-wrap panel-section panel-section--compact">
          <div class="section-head section-head--tight">
            <h2>Builder</h2>
            <span class="muted">Tabbed editor</span>
          </div>
          <div class="segmented segmented--editor" role="tablist" aria-label="Editor sections">
            <button type="button" class="is-active" data-editor-tab="build">Build</button>
            <button type="button" data-editor-tab="constraints">Constraints</button>
            <button type="button" data-editor-tab="core">Core</button>
            <button type="button" data-editor-tab="effects">Effects</button>
            <button type="button" data-editor-tab="expert">Expert</button>
            <button type="button" data-editor-tab="presets">Presets</button>
          </div>
        </div>

        <section class="panel-section editor-panel is-active" data-editor-panel="build">
          <div class="section-head">
            <h2>Build</h2>
            <span class="chip">V1 scaffold</span>
          </div>

          <div class="field">
            <label for="startMode">Start mode</label>
            <select id="startMode">
              <option value="element">Element</option>
              <option value="intent">Intent</option>
            </select>
          </div>

          <div class="field" id="elementField">
            <label for="elementSelect">Element</label>
            <select id="elementSelect"></select>
          </div>

          <div class="field" id="intentField">
            <label for="intentSelect">Intent</label>
            <select id="intentSelect"></select>
          </div>

          <div class="field">
            <label for="styleDnaSelect">Style DNA</label>
            <select id="styleDnaSelect"></select>
          </div>
        </section>

        <section class="panel-section editor-panel" data-editor-panel="constraints">
          <div class="section-head">
            <h2>Constraints</h2>
            <span class="muted">Constraint-first</span>
          </div>
          <div id="constraintsList" class="stack"></div>
        </section>

        <section class="panel-section editor-panel" data-editor-panel="core">
          <div class="section-head">
            <h2>Core</h2>
            <span class="muted">Schema-driven</span>
          </div>
          <form id="coreForm" class="stack"></form>
        </section>

        <section class="panel-section editor-panel" data-editor-panel="effects">
          <div class="section-head">
            <h2>Effects</h2>
            <span class="muted">Shadows, motion, polish</span>
          </div>
          <form id="effectsForm" class="stack"></form>
        </section>

        <section class="panel-section editor-panel" data-editor-panel="expert">
          <div class="section-head">
            <h2>Expert</h2>
            <span class="muted">Advanced output</span>
          </div>
          <form id="expertForm" class="stack"></form>
        </section>

        <section class="panel-section editor-panel" data-editor-panel="presets">
          <div class="section-head">
            <h2>Presets</h2>
            <span class="muted">Local</span>
          </div>

          <div class="field">
            <label for="presetSelect">Saved presets</label>
            <select id="presetSelect">
              <option value="">Select a preset</option>
            </select>
          </div>

          <div class="actions-row">
            <button id="loadPresetBtn" class="button secondary" type="button">Load preset</button>
            <button id="deletePresetBtn" class="button ghost" type="button">Delete</button>
          </div>

          <div>
            <h3 class="mini-heading">Recent builds</h3>
            <ul id="recentList" class="mini-list"></ul>
          </div>
        </section>
      </aside>

      <section class="panel panel--center">
        <section class="panel-section panel-section--sticky">
          <div class="section-head">
            <h2>Preview</h2>
            <span id="buildSummary" class="muted">Ready</span>
          </div>

          <div class="toolbar">
            <div class="segmented" role="group" aria-label="Preview mode">
              <button type="button" data-preview-mode="single" class="is-active">Single</button>
              <button type="button" data-preview-mode="matrix">State Matrix</button>
            </div>

            <div class="segmented" role="group" aria-label="Viewport">
              <button type="button" data-viewport="mobile" class="is-active">Mobile</button>
              <button type="button" data-viewport="tablet">Tablet</button>
              <button type="button" data-viewport="desktop">Desktop</button>
            </div>
          </div>

          <div id="warningPanel" class="warning-panel" hidden></div>

          <div id="previewFrame" class="preview-frame preview-frame--mobile">
            <style id="previewStyle"></style>
            <div id="previewRoot" class="preview-root"></div>
          </div>
        </section>
      </section>

      <aside class="panel panel--right">
        <section class="panel-section">
          <div class="section-head">
            <h2>Export</h2>
            <span class="muted">Vanilla</span>
          </div>

          <div class="toolbar toolbar--tight">
            <div class="segmented" role="tablist" aria-label="Code output">
              <button type="button" class="is-active" data-code-tab="html">HTML</button>
              <button type="button" data-code-tab="css">CSS</button>
              <button type="button" data-code-tab="js">JS</button>
            </div>

            <div class="actions-row">
              <button id="copyCurrentBtn" class="button secondary" type="button">Copy tab</button>
              <button id="copyAllBtn" class="button" type="button">Copy all</button>
            </div>
          </div>

          <div class="code-panels">
            <textarea id="htmlOutput" class="code-output is-active" readonly spellcheck="false"></textarea>
            <textarea id="cssOutput" class="code-output" readonly spellcheck="false"></textarea>
            <textarea id="jsOutput" class="code-output" readonly spellcheck="false"></textarea>
          </div>
        </section>

        <section class="panel-section">
          <div class="section-head">
            <h2>Notes</h2>
            <span class="muted">Generated</span>
          </div>
          <ul id="notesList" class="mini-list"></ul>
        </section>
      </aside>
    </main>
  </div>

  <div id="toast" class="toast" aria-live="polite" hidden></div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
